name: Deploy frontend to GitHub Pages

# Builds the Vite app and publishes it to GitHub Pages. The backend URL is read
# from the `VITE_API_BASE_URL` repository variable (Settings → Secrets and
# variables → Actions → Variables), e.g. https://ortodynamic-api.onrender.com/api/v1
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

# Permissions the deploy-pages action requires.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; let an in-flight run finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          # Project sites are served under /<repo>/; must match the repo name.
          VITE_BASE_PATH: /OrtoDynamic/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
